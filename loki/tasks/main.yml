---
# tasks file for loki
- name: Prepare OS
  ansible.builtin.import_tasks: 01_preflight.yml

- name: Install Loki
  ansible.builtin.import_tasks: 02_install.yml

- name: Configuration Loki
  ansible.builtin.import_tasks: 03_config.yml

- name: Delete temporary directory
  ansible.builtin.file:
    path: "{{ _loki_tempdir.path }}"
    state: absent
  failed_when: false
  changed_when: false
  tags:
    - always
...
