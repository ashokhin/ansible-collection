---
# handlers file for alloy
- name: Stop Alloy
  ansible.builtin.systemd_service:
    name: "{{ alloy_service_name }}"
    daemon_reload: true
    enabled: true
    force: true
    state: stopped
  listen:
    - "restart alloy"
    - "update symlink"

- name: Update symlink
  ansible.builtin.file:
    src: "{{ alloy_release_path }}"
    path: "{{ alloy_releases_path }}/current"
    state: link
    owner: "{{ alloy_user }}"
    group: "{{ alloy_group }}"
  listen:
    - "update symlink"

- name: Start Alloy
  ansible.builtin.systemd_service:
    name: "{{ alloy_service_name }}"
    daemon_reload: true
    enabled: true
    force: true
    state: started
  listen:
    - "restart alloy"
    - "update symlink"

- name: "Waiting for start Alloy on port {{ alloy_http_listen_port }}"
  ansible.builtin.wait_for:
    port: "{{ alloy_http_listen_port }}"
    timeout: 60
  listen:
    - "restart alloy"
...
